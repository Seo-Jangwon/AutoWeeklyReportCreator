name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --name auto-weekly-report-creator --icon=icons\favicon.ico --add-data "icons;icons" main.py

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/auto-weekly-report-creator.exe
          generate_release_notes: true
